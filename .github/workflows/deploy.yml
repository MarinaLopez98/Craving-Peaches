name: Deploy GitHub Pages

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true
          fetch-depth: 0
      - name: Copy site files to public folder
        run: |
          rm -rf public
          mkdir -p public/images
          cp index.html arte.html desahogo.html libros.html styles.css .nojekyll public/
          cp images/*.svg public/images/ 2>/dev/null || true
          echo "=== public contents ==="
          find public -maxdepth 2 -type f | sort
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v1
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    steps:
      - uses: actions/deploy-pages@v1
